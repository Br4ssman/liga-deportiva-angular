<section class="container my-5">
  <h2 class="text-center mb-4">Jugadores</h2>
  <div class="row g-4" id="listaJugadores">
    @for (jugador of jugadores; track jugador.id) {
      <div class="col-12 col-sm-6 col-md-4 jugador-card">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center">
            <h5 class="card-title">{{ jugador.nombre }}</h5>
            <p class="text-muted">{{ jugador.posicion }}</p>
            <button class="btn btn-dark btn-sm">Ver ficha</button>
          </div>
        </div>
      </div>
    }
  </div>
</section>
